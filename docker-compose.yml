services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phlowbooks}
      POSTGRES_USER: ${POSTGRES_USER:-phlowbooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phlowbooks} -d ${POSTGRES_DB:-phlowbooks}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-phlowbooks}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-phlowbooks}
      UPLOAD_DIR: /app/uploads
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TESSERACT_CMD: /usr/bin/tesseract
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /v1
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  backend-uploads:
